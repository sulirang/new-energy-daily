sources:
  - name: "pv magazine Italia RSS"
    type: "rss"
    url: "https://www.pv-magazine.it/feed/"
    enabled: true
    allow_undated: false
    tags: ["光伏", "欧洲", "意大利"]

  - name: "pv magazine Italia Exa"
    type: "exa"
    enabled: true
    query: "notizie fotovoltaico solare accumulo idrogeno energie rinnovabili pubblicate il {date}"
    include_domains:
      - "www.pv-magazine.it"
    search_type: "auto"
    max_results: 30
    text_max_characters: 5000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["光伏", "欧洲", "意大利"]
