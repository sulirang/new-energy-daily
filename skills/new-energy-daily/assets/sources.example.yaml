# Copy to config/sources.yaml and replace with the user's real sources.
# RSS/Atom is preferred. Webpage selectors are only a fallback.

timezone: Europe/Rome
collection_cutoff_time: "07:00"
max_items_per_source: 20
fetch_article_text: true
minimum_news_score: 60
market_max_workers: 2

# Optional top-of-report PUN Index GME and Italian physical zonal prices.
# The VPS talks only to Firecrawl; Firecrawl's hosted browser loads GME.
gme_zonal_prices:
  enabled: true
  page_url: "https://www.mercatoelettrico.org/en-us/Home/Results/Electricity/MGP/Results/ZonalPrices"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "IT"
  languages: ["it-IT"]
  wait_for_ms: 8000
  timeout_ms: 120000
  interact_timeout_seconds: 90
  max_attempts: 2

# Optional Hungarian day-ahead prices from the official HUPX Labs 15-minute dataset.
hupx_day_ahead_prices:
  enabled: true
  page_url: "https://labs.hupx.hu/view/DAM_Aggregated_Trading_Data_15min_v1"
  source_url: "https://hupx.hu"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "HU"
  languages: ["hu-HU", "en-US"]
  wait_for_ms: 8000
  timeout_ms: 120000
  interact_timeout_seconds: 60
  max_attempts: 2

# Optional Spanish day-ahead prices from OMIE's official dated TXT dataset.
omie_day_ahead_prices:
  enabled: true
  page_url: "https://www.omie.es/en/market-results/daily/daily-market/day-ahead-price"
  source_url: "https://www.omie.es/en/market-results/daily/daily-market/day-ahead-price"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "ES"
  languages: ["es-ES", "en-US"]
  wait_for_ms: 8000
  timeout_ms: 120000
  interact_timeout_seconds: 60
  max_attempts: 2

# Optional European gas benchmark. Firecrawl scrapes NDI first, then NGP on failure or missing target-day data.
eex_ttf_gas_price:
  enabled: true
  ndi_url: "https://gasandregistry.eex.com/Gas/NDI/NDI_45_Days.csv"
  ngp_url: "https://gasandregistry.eex.com/Gas/NGP/TTF_NGP_60_Days.csv"
  ndi_source_url: "https://gasandregistry.eex.com/Gas/NDI/NDI_45_Days.csv"
  ngp_source_url: "https://gasandregistry.eex.com/Gas/NGP/TTF_NGP_60_Days.csv"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "DE"
  languages: ["en-US"]
  wait_for_ms: 1000
  timeout_ms: 120000
  max_attempts: 2

# Optional Italian natural-gas reference price from IG Index GME.
gme_gas_price:
  enabled: true
  page_url: "https://www.mercatoelettrico.org/en-us/Home/Publications/Indexes-GME/IGIndexGmeResults"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "IT"
  languages: ["it-IT"]
  wait_for_ms: 8000
  timeout_ms: 120000
  interact_timeout_seconds: 60
  max_attempts: 2

# Optional Hungarian DA gas price: CEEREP first, then volume-weighted average price.
ceegex_gas_price:
  enabled: true
  page_url: "https://ceegex.hu/en/market-data/daily-data"
  source_url: "https://ceegex.hu/en/market-data/daily-data"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "HU"
  languages: ["hu-HU", "en-US"]
  wait_for_ms: 8000
  timeout_ms: 120000
  interact_timeout_seconds: 60
  max_attempts: 2

# Optional Spanish PVB Price Index for each gas day.
mibgas_gas_price:
  enabled: true
  page_url: "https://www.mibgas.es/en/market-results/gas-daily-price-index-and-volumes"
  source_url: "https://www.mibgas.es/en/market-results/gas-daily-price-index-and-volumes"
  api_base: "https://api.firecrawl.dev"
  proxy: "auto"
  country: "ES"
  languages: ["es-ES", "en-US"]
  wait_for_ms: 10000
  timeout_ms: 120000
  interact_timeout_seconds: 60
  max_attempts: 2

include_keywords:
  - 新能源
  - 光伏
  - 风电
  - 储能
  - 电池
  - 锂电
  - 钠电
  - 氢能
  - 充电桩
  - 换电
  - 新能源汽车
  - 电力市场
  - 虚拟电厂
  - 碳市场
  - renewable
  - solar
  - wind
  - battery
  - energy storage
  - hydrogen
  - EV
  - charging
  - grid

exclude_keywords:
  - 招聘
  - 展会邀请
  - 广告
  - 促销

sources:
  # Add one or more API keys to config/exa_keys.txt before enabling Exa sources.
  - name: "ENTSO-E"
    type: "rss"
    url: "https://www.entsoe.eu/rss/news.xml"
    enabled: true
    allow_undated: false
    tags: ["欧洲", "电网", "电力市场"]

  - name: "European Commission Energy"
    type: "rss"
    url: "https://energy.ec.europa.eu/node/2/rss_en"
    enabled: true
    allow_undated: false
    tags: ["政策", "欧盟", "能源转型"]

  - name: "Euractiv Energy"
    type: "exa"
    enabled: true
    landing_page: "https://www.euractiv.com/topics/energy/"
    query: "Euractiv energy policy electricity gas renewables grid climate published between {window_start} and {window_end}"
    include_domains: ["www.euractiv.com"]
    search_type: "auto"
    max_results: 20
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["政策", "欧洲", "能源市场"]

  - name: "CEPS"
    type: "exa"
    enabled: true
    landing_page: "https://www.ceps.eu/"
    query: "CEPS research publication energy climate electricity renewables hydrogen policy published between {window_start} and {window_end}"
    include_domains:
      - "www.ceps.eu"
    search_type: "auto"
    max_results: 15
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["政策", "研究", "欧洲", "能源转型"]

  - name: "Oxford Institute for Energy Studies"
    type: "exa"
    enabled: true
    landing_page: "https://www.oxfordenergy.org/publications/"
    query: "Oxford Institute for Energy Studies publication electricity gas hydrogen renewable energy published between {window_start} and {window_end}"
    include_domains: ["www.oxfordenergy.org"]
    search_type: "auto"
    max_results: 15
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["研究", "欧洲", "电力市场", "天然气", "氢能"]

  - name: "Energy Community"
    type: "exa"
    enabled: true
    landing_page: "https://www.energy-community.org/news/Energy-Community-News.html"
    query: "Energy Community news electricity renewable energy market reform grid published between {window_start} and {window_end}"
    include_domains: ["www.energy-community.org"]
    search_type: "auto"
    max_results: 15
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["政策", "欧洲", "电力市场", "电网"]

  - name: "Agora Energiewende"
    type: "exa"
    enabled: true
    landing_page: "https://www.agora-energiewende.org/news-events/filter/tab-1"
    query: "Agora Energiewende news event publication power market renewable energy hydrogen published between {window_start} and {window_end}"
    include_domains: ["www.agora-energiewende.org"]
    search_type: "auto"
    max_results: 15
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["研究", "政策", "欧洲", "电力市场"]

  - name: "Bruegel"
    type: "exa"
    enabled: true
    landing_page: "https://www.bruegel.org/publications"
    query: "Bruegel publication energy climate electricity gas hydrogen published between {window_start} and {window_end}"
    include_domains: ["www.bruegel.org"]
    search_type: "auto"
    max_results: 15
    text_max_characters: 6000
    append_date_to_query: true
    use_api_date_filter: false
    allow_undated: false
    tags: ["研究", "政策", "欧洲", "能源经济"]

  - name: "示例RSS信源"
    type: "rss"
    url: "https://example.com/rss.xml"
    enabled: false
    allow_undated: false
    tags: ["综合"]

  - name: "示例网页信源"
    type: "webpage"
    list_url: "https://example.com/news"
    enabled: false
    allow_undated: false
    item_selector: "a"
    title_selector: null
    url_attr: "href"
    date_selector: null
    article_selector: "article"
    tags: ["综合"]
