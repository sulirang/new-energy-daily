name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: skills/new-energy-daily/assets/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/new-energy-daily/assets/requirements.txt pytest
      - name: Compile
        run: python -m py_compile skills/new-energy-daily/scripts/new_energy_daily.py
      - name: Test
        run: pytest -q
